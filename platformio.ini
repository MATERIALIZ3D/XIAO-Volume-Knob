; XIAO ESP32-C3 Bluetooth Volume Knob
; Rotary encoder (16mm 24P/R + switch) + 12x WS2812 LED ring
;
; Notes on the pinned versions:
;   - platform espressif32 @ 6.5.0 ships Arduino-ESP32 core 2.0.14, which is the
;     combination ESP32-BLE-Keyboard 0.3.x is known-good against. Bumping the
;     platform to a 3.x core will likely break the BLE library, so it is pinned.
;   - The ESP32-C3 only has Bluetooth LE (no Classic). The media keys here are
;     sent over BLE HID, which Windows / macOS / Linux / Android all accept.

[env:seeed_xiao_esp32c3]
platform = espressif32@6.5.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1      ; route Serial to the native USB port
    -D USE_NIMBLE                     ; use NimBLE stack: stable BLE HID on C3 + Win11

lib_deps =
    t-vk/ESP32 BLE Keyboard@^0.3.2
    h2zero/NimBLE-Arduino@^1.4.1      ; 1.x line is what BLE-Keyboard 0.3.x targets
    fastled/FastLED@^3.6.0
