<svg viewBox="0 0 1120 860" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">XIAO ESP32-C3 Bluetooth Volume Knob — colour wiring diagram</title>
  <desc id="desc">Wiring between a Seeed XIAO ESP32-C3, a 16 mm rotary encoder with push switch, and a 12-LED WS2812 ring, with colour-coded wires and a legend.</desc>

  <!-- ===== background ===== -->
  <rect x="0" y="0" width="1120" height="860" fill="#f7f8fa"/>
  <text x="40" y="46" font-size="27" font-weight="700" fill="#1b2733">XIAO ESP32-C3 — Bluetooth Volume Knob</text>
  <text x="40" y="72" font-size="15" fill="#5a6672">Rotary encoder (16 mm 24 P/R + switch) &#183; 12&#215; WS2812 ring &#183; wiring &amp; pin map</text>

  <!-- =========================================================== -->
  <!--  WIRES (drawn first so components sit on top)                -->
  <!--  Crossings without a solder dot = NO connection             -->
  <!-- =========================================================== -->
  <g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Encoder A -> D4 (green) -->
    <polyline points="330,350 400,350 400,420 470,420" stroke="#2f9e44"/>
    <!-- Encoder B -> D5 (blue) -->
    <polyline points="330,430 388,430 388,460 470,460" stroke="#1971c2"/>
    <!-- Switch -> D6 (amber) -->
    <polyline points="330,470 376,470 376,500 470,500" stroke="#f08c00"/>

    <!-- GND net (black): encoder common + switch common + ring GND -> XIAO GND -->
    <polyline points="330,390 360,390 360,610" stroke="#212529"/>       <!-- enc common down -->
    <polyline points="330,510 360,510" stroke="#212529"/>               <!-- switch common in -->
    <polyline points="360,610 960,610" stroke="#212529"/>               <!-- bottom GND rail -->
    <polyline points="700,610 700,300 662,300" stroke="#212529"/>       <!-- up-leg to GND pad -->
    <polyline points="960,470 960,610" stroke="#212529"/>               <!-- ring GND down to rail -->

    <!-- 5V (red): XIAO 5V -> ring VDD -->
    <polyline points="662,260 745,260 745,455 860,455" stroke="#e03131"/>

    <!-- DATA (purple): D10 -> 330R -> ring DIN -->
    <polyline points="662,380 792,380" stroke="#ae3ec9"/>
    <polyline points="832,380 900,380 900,455" stroke="#ae3ec9"/>
  </g>

  <!-- 330 ohm series resistor on the data line -->
  <g>
    <polyline points="792,380 798,370 806,390 814,370 822,390 828,380 832,380" fill="none" stroke="#ae3ec9" stroke-width="5" stroke-linejoin="round"/>
    <text x="812" y="358" font-size="12.5" fill="#5a6672" text-anchor="middle">330 &#937;</text>
  </g>

  <!-- solder-junction dots (real connections only) -->
  <g fill="#212529">
    <circle cx="360" cy="390" r="6"/>
    <circle cx="360" cy="510" r="6"/>
    <circle cx="700" cy="610" r="6"/>
    <circle cx="960" cy="610" r="6"/>
  </g>

  <!-- =========================================================== -->
  <!--  XIAO ESP32-C3 BOARD                                         -->
  <!-- =========================================================== -->
  <g>
    <rect x="470" y="220" width="180" height="330" rx="12" fill="#20303d" stroke="#0e1a22" stroke-width="2"/>
    <!-- USB-C -->
    <rect x="536" y="200" width="48" height="26" rx="7" fill="#c7ccd1" stroke="#8b9299" stroke-width="2"/>
    <text x="560" y="218" font-size="10.5" fill="#3a4148" text-anchor="middle" font-weight="600">USB-C</text>
    <!-- antenna hint -->
    <rect x="500" y="234" width="120" height="26" rx="4" fill="#2b3d4b"/>
    <text x="560" y="252" font-size="11" fill="#8fa0ad" text-anchor="middle">ESP32-C3 &#183; BLE</text>
    <text x="560" y="540" font-size="13" fill="#9fb0bd" text-anchor="middle" font-weight="600">XIAO ESP32-C3</text>

    <!-- LEFT pads: D0..D6 -->
    <g font-size="13" font-weight="600">
      <!-- pad nubs on left edge -->
      <g fill="#e6b800">
        <rect x="458" y="254" width="12" height="12"/><rect x="458" y="294" width="12" height="12"/>
        <rect x="458" y="334" width="12" height="12"/><rect x="458" y="374" width="12" height="12"/>
        <rect x="458" y="414" width="12" height="12"/><rect x="458" y="454" width="12" height="12"/>
        <rect x="458" y="494" width="12" height="12"/>
      </g>
      <g fill="#cfd8df" text-anchor="start">
        <text x="482" y="265">D0</text><text x="482" y="305">D1</text><text x="482" y="345">D2</text>
        <text x="482" y="385">D3</text>
        <text x="482" y="425" fill="#7fe39a">D4</text>
        <text x="482" y="465" fill="#7fb8e6">D5</text>
        <text x="482" y="505" fill="#ffcf80">D6</text>
      </g>
      <!-- GPIO subtitles left -->
      <g fill="#6d7d8a" font-size="10" font-weight="400" text-anchor="start">
        <text x="482" y="437">GPIO6</text><text x="482" y="477">GPIO7</text><text x="482" y="517">GPIO21</text>
      </g>
    </g>

    <!-- RIGHT pads: 5V GND 3V3 D10 D9 D8 D7 -->
    <g font-size="13" font-weight="600">
      <g fill="#e6b800">
        <rect x="650" y="254" width="12" height="12"/><rect x="650" y="294" width="12" height="12"/>
        <rect x="650" y="334" width="12" height="12"/><rect x="650" y="374" width="12" height="12"/>
        <rect x="650" y="414" width="12" height="12"/><rect x="650" y="454" width="12" height="12"/>
        <rect x="650" y="494" width="12" height="12"/>
      </g>
      <g fill="#cfd8df" text-anchor="end">
        <text x="638" y="265" fill="#ff9b9b">5V</text>
        <text x="638" y="305">GND</text>
        <text x="638" y="345">3V3</text>
        <text x="638" y="385" fill="#e6a8f0">D10</text>
        <text x="638" y="425">D9</text><text x="638" y="465">D8</text><text x="638" y="505">D7</text>
      </g>
      <g fill="#6d7d8a" font-size="10" font-weight="400" text-anchor="end">
        <text x="638" y="397">GPIO10</text>
      </g>
    </g>
  </g>

  <!-- =========================================================== -->
  <!--  ROTARY ENCODER                                             -->
  <!-- =========================================================== -->
  <g>
    <rect x="130" y="330" width="200" height="210" rx="10" fill="#c7ccd1" stroke="#8b9299" stroke-width="2"/>
    <!-- shaft/knob -->
    <circle cx="205" cy="435" r="58" fill="#3a4148" stroke="#22282d" stroke-width="3"/>
    <circle cx="205" cy="435" r="30" fill="#4c555d"/>
    <rect x="199" y="392" width="12" height="30" rx="4" fill="#20262b"/>
    <text x="205" y="325" font-size="14" fill="#3a4148" text-anchor="middle" font-weight="700">Rotary encoder</text>
    <text x="205" y="530" font-size="11" fill="#5a6672" text-anchor="middle">16 mm 24 P/R + push switch</text>

    <!-- terminals on right edge -->
    <g>
      <g fill="#8b9299">
        <rect x="330" y="344" width="12" height="12"/><rect x="330" y="384" width="12" height="12"/>
        <rect x="330" y="424" width="12" height="12"/><rect x="330" y="464" width="12" height="12"/>
        <rect x="330" y="504" width="12" height="12"/>
      </g>
      <g font-size="12.5" font-weight="700" text-anchor="end">
        <text x="326" y="355" fill="#2f9e44">A</text>
        <text x="326" y="395" fill="#495057">C (com)</text>
        <text x="326" y="435" fill="#1971c2">B</text>
        <text x="326" y="475" fill="#e8930a">SW</text>
        <text x="326" y="515" fill="#495057">SW (com)</text>
      </g>
    </g>
  </g>

  <!-- =========================================================== -->
  <!--  WS2812 LED RING (12 px)                                    -->
  <!-- =========================================================== -->
  <g>
    <circle cx="895" cy="360" r="92" fill="#1b2733" stroke="#0e1a22" stroke-width="2"/>
    <circle cx="895" cy="360" r="50" fill="#f7f8fa"/>
    <text x="895" y="356" font-size="14" fill="#5a6672" text-anchor="middle" font-weight="700">WS2812</text>
    <text x="895" y="374" font-size="12" fill="#5a6672" text-anchor="middle">ring &#215;12</text>

    <!-- 12 LEDs -->
    <g stroke="#d4dae0" stroke-width="1">
      <rect x="959" y="352" width="16" height="16" rx="2" fill="#ff5c5c"/>
      <rect x="949" y="388" width="16" height="16" rx="2" fill="#ff9f43"/>
      <rect x="923" y="414" width="16" height="16" rx="2" fill="#ffe14d"/>
      <rect x="887" y="424" width="16" height="16" rx="2" fill="#7bed9f"/>
      <rect x="851" y="414" width="16" height="16" rx="2" fill="#2ed573"/>
      <rect x="825" y="388" width="16" height="16" rx="2" fill="#22d3d3"/>
      <rect x="815" y="352" width="16" height="16" rx="2" fill="#1e90ff"/>
      <rect x="825" y="316" width="16" height="16" rx="2" fill="#5f6bff"/>
      <rect x="851" y="290" width="16" height="16" rx="2" fill="#9c5cff"/>
      <rect x="887" y="280" width="16" height="16" rx="2" fill="#e05cff"/>
      <rect x="923" y="290" width="16" height="16" rx="2" fill="#ff5cc8"/>
      <rect x="949" y="316" width="16" height="16" rx="2" fill="#ff5c8a"/>
    </g>

    <!-- terminal block below the ring -->
    <rect x="836" y="450" width="150" height="30" rx="4" fill="#2b3d4b"/>
    <g fill="#e6b800">
      <rect x="854" y="452" width="12" height="12"/><rect x="894" y="452" width="12" height="12"/>
      <rect x="934" y="452" width="12" height="12"/><rect x="974" y="452" width="12" height="12"/>
    </g>
    <g font-size="11" font-weight="700" text-anchor="middle">
      <text x="860" y="497" fill="#e03131">5V</text>
      <text x="900" y="497" fill="#ae3ec9">DIN</text>
      <text x="940" y="497" fill="#495057">GND</text>
      <text x="980" y="497" fill="#9aa7b2">DOUT</text>
    </g>
    <text x="980" y="512" font-size="9.5" fill="#9aa7b2" text-anchor="middle">(not used)</text>
  </g>

  <!-- =========================================================== -->
  <!--  LEGEND                                                     -->
  <!-- =========================================================== -->
  <g>
    <rect x="40" y="640" width="1040" height="180" rx="12" fill="#ffffff" stroke="#dde3e8" stroke-width="1.5"/>
    <text x="60" y="672" font-size="16" font-weight="700" fill="#1b2733">Connections</text>

    <g font-size="13.5" fill="#33404a">
      <!-- col 1 -->
      <g>
        <rect x="60" y="690" width="26" height="6" rx="3" fill="#2f9e44"/>
        <text x="98" y="697">Encoder A &#8594; D4 (GPIO6)</text>
        <rect x="60" y="716" width="26" height="6" rx="3" fill="#1971c2"/>
        <text x="98" y="723">Encoder B &#8594; D5 (GPIO7)</text>
        <rect x="60" y="742" width="26" height="6" rx="3" fill="#f08c00"/>
        <text x="98" y="749">Switch &#8594; D6 (GPIO21)</text>
      </g>
      <!-- col 2 -->
      <g>
        <rect x="400" y="690" width="26" height="6" rx="3" fill="#ae3ec9"/>
        <text x="438" y="697">Ring DIN &#8594; D10 (GPIO10), via 330 &#937;</text>
        <rect x="400" y="716" width="26" height="6" rx="3" fill="#e03131"/>
        <text x="438" y="723">Ring 5V &#8594; XIAO 5V</text>
        <rect x="400" y="742" width="26" height="6" rx="3" fill="#212529"/>
        <text x="438" y="749">GND net: enc. com + SW com + ring GND &#8594; GND</text>
      </g>
    </g>

    <line x1="60" y1="770" x2="1060" y2="770" stroke="#e6ebef" stroke-width="1.5"/>
    <text x="60" y="792" font-size="12.5" fill="#5a6672">
      Encoder A/B/switch use internal pull-ups (no resistors). 330 &#937; in series on DIN tames ringing;
    </text>
    <text x="60" y="810" font-size="12.5" fill="#5a6672">
      add a 470&#8211;1000 &#181;F cap across the ring's 5V/GND. 12 LEDs at full white &#8776; 700 mA &#8212; firmware caps brightness/current.
    </text>
  </g>
</svg>
